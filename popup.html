<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Job Form AI Assistant</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="card">
      <header class="hero">
        <p class="eyebrow">Job Form Copilot</p>
        <h1>Smart Answers From Your Resume</h1>
        <p class="hint">Upload PDF or paste text once. On any job form input, you will get instant AI suggestions.</p>
      </header>

      <section class="section toggle-row">
        <div>
          <p class="toggle-title">Assistant</p>
          <p class="tiny">Turn OFF to stop auto-suggestions on every input.</p>
        </div>
        <label class="switch" for="assistantEnabled">
          <input id="assistantEnabled" type="checkbox" />
          <span class="slider"></span>
        </label>
      </section>

      <section class="section">
        <label for="resumeFile">Resume PDF</label>
        <div class="row">
          <input id="resumeFile" type="file" accept="application/pdf" />
          <button id="extractBtn" class="secondary" type="button">Extract PDF</button>
        </div>
        <p id="pdfMeta" class="tiny">No PDF selected.</p>
      </section>

      <section class="section">
        <label for="resumeText">Resume Text</label>
        <textarea id="resumeText" rows="9" placeholder="Paste resume content here (optional if PDF extract works)..."></textarea>
      </section>

      <section class="section two-col">
        <div>
          <label for="apiKey">OpenAI API Key</label>
          <input id="apiKey" type="password" placeholder="sk-..." />
        </div>
        <div>
          <label for="model">Model</label>
          <input id="model" type="text" placeholder="gpt-4o-mini" />
        </div>
      </section>
      <section class="section">
        <label for="mistralApiKey">Mistral API Key (optional, better OCR)</label>
        <input id="mistralApiKey" type="password" placeholder="mistral-..." />
      </section>

      <button id="saveBtn" class="primary" type="button">Save Settings</button>
      <p id="status" aria-live="polite"></p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
